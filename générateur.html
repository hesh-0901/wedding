<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur d'Invitations - Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    /* Écran de verrouillage plein écran Premium */
    .auth-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--light, #f4f6f0);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .auth-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(65, 68, 60, 0.08);
      border: 1px solid var(--border, #e2e4dc);
      text-align: center;
      max-width: 400px;
      width: 90%;
      animation: fadeIn 0.5s ease-out;
    }

    .auth-card h2 {
      font-family: 'Georgia', serif;
      color: var(--dark, #2b2d27);
      margin-bottom: 10px;
      font-size: 1.6rem;
    }

    .auth-card p {
      color: var(--muted, #7c8072);
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    .auth-field-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .auth-input {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border, #e2e4dc);
      border-radius: 6px;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-input:focus {
      border-color: var(--gold, #c5a880);
    }

    .btn-auth {
      width: 100%;
      background: var(--dark, #2b2d27);
      color: var(--cream, #fcfdfe);
      border: none;
      padding: 14px;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-auth:hover {
      background: var(--text, #41443c);
    }

    .auth-error {
      color: #b93c3c;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    /* Masquage et affichage fluide de l'application principale */
    .app-hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .app-visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Zone de résultat de l'invitation fusionnée */
    .qr-result-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px dashed var(--border);
      animation: fadeIn 0.4s ease-out forwards;
    }

    /* Conteneur d'aperçu de la carte finale */
    .preview-canvas-wrapper {
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(65, 68, 60, 0.08);
      overflow: hidden;
      background: #fcfdfe;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* Conteneur des deux boutons d'action */
    .actions-wrapper {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    @media (max-width: 500px) {
      .actions-wrapper { flex-direction: column; }
    }

    .btn-action-premium {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-download-style {
      background: white;
      color: var(--dark);
      border: 1px solid var(--gold);
    }

    .btn-download-style:hover {
      background: var(--light);
      border-color: var(--dark);
    }

    .btn-next-style {
      background: var(--dark);
      color: var(--cream);
      border: 1px solid var(--dark);
    }

    .btn-next-style:hover {
      background: var(--text);
    }

    .icon-svg-action {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* Élément technique masqué servant à fabriquer le QR code brut */
    #qrcode-hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <h2>Espace Sécurisé</h2>
      <p>Veuillez entrer le code d'accès pour générer les invitations.</p>
      
      <div class="auth-field-wrapper">
        <input type="password" id="authPassword" class="auth-input" placeholder="••••" maxlength="10">
        <div id="authError" class="auth-error">Code d'accès incorrect.</div>
      </div>
      
      <button id="btnAuthSubmit" class="btn-auth">Valider l'accès</button>
    </div>
  </div>

  <div class="container app-hidden" id="mainContainer">
    <a href="index.html" class="btn-back" style="display: flex; align-items: center; gap: 6px;">
      <svg style="width:16px; height:16px; fill:none; stroke:var(--muted); stroke-width:2;" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour à l'accueil
    </a>
    
    <h1>Générer une Invitation</h1>

    <div class="section">
      <form id="formInvite" onsubmit="return false;">
        <div class="form-group">
          <label>Nom complet de l'invité</label>
          <input type="text" id="nom" placeholder="Ex: Couple Hénoch SHUNGU">
        </div>
        <div class="form-group">
          <label>Catégorie d'invité</label>
          <select id="categorie">
            <option value="Famille Proche">Famille Proche</option>
            <option value="Parents">Parents</option>
            <option value="Connaissances">Connaissances</option>
            <option value="Parains">Parains</option>
            <option value="Collègues">Collègues</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nom de la table</label>
          <input type="text" id="nomTable" placeholder="Ex: Table Émeraude">
        </div>
        <div class="form-group">
          <label>Numéro de table</label>
          <input type="number" id="numTable" placeholder="Ex: 3">
        </div>
        <button class="btn-submit" id="btnGenerer">Enregistrer & Créer le QR Code</button>
      </form>

      <div id="qrcode-hidden"></div>

      <div id="qr-wrapper" class="qr-result-container">
        <label style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;">Aperçu de l'invitation officielle</label>
        
        <div class="preview-canvas-wrapper">
          <canvas id="invitationCanvas"></canvas>
        </div>
        
        <div class="actions-wrapper">
          <button class="btn-action-premium btn-download-style" onclick="telechargerInvitation()">
            <svg class="icon-svg-action" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Télécharger l'Invitation
          </button>

          <button class="btn-action-premium btn-next-style" onclick="creerSuivant()">
            Créer le suivant
            <svg class="icon-svg-action" viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { db, doc, setDoc, getDoc } from "./firebase-config.js";

    // --- VERIFICATION SECURISEE DU MOT DE PASSE FIRESTORE ---
    async function verifierAcces() {
      const overlay = document.getElementById("authOverlay");
      const container = document.getElementById("mainContainer");
      const input = document.getElementById("authPassword");
      const errorMsg = document.getElementById("authError");
      const btnSubmit = document.getElementById("btnAuthSubmit");

      input.focus();

      async function validerCode() {
        const codeSaisi = input.value.trim();
        if (!codeSaisi) return;

        try {
          const docRef = doc(db, "password", "pass");
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            const motDePasseCorrect = docSnap.data().password;

            if (codeSaisi === motDePasseCorrect) {
              overlay.style.opacity = "0";
              overlay.style.visibility = "hidden";
              
              container.classList.remove("app-hidden");
              container.classList.add("app-visible");
              
              setTimeout(() => document.getElementById("nom").focus(), 400);
            } else {
              errorMsg.style.display = "block";
              input.value = "";
              input.focus();
            }
          } else {
            alert("Erreur Firebase : Document introuvable.");
          }
        } catch (error) {
          console.error("Erreur d'authentification : ", error);
          alert("Erreur lors de la connexion à la base de données.");
        }
      }

      btnSubmit.addEventListener("click", validerCode);

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") validerCode();
      });

      input.addEventListener("input", () => {
        errorMsg.style.display = "none";
      });
    }

    // Exécuter immédiatement le verrouillage de sécurité
    verifierAcces();

    // --- CONFIGURATION GÉOMÉTRIQUE DU QR CODE ET TEXTE ---
    const REGLAGES_IMAGE = {
      tailleQR: 130,   // S'intègre sans déborder dans le carré
      positionX: 326,  // Centrage latéral chirurgical du QR Code
      positionY: 665,  // Alignement vertical du QR Code
      
      // Réglages typographiques pour le nom de l'invité
      couleurTexte: "#41443c",
      taillePolice: "24px",     // Ajuste en pixels pour remplir harmonieusement la forme
      axeYTexteDepuisLeBas: 22  // Position verticale précise dans la forme arrondie blanche du bas
    };
    
    let qrcodeHiddenContainer = document.getElementById("qrcode-hidden");
    let canvas = document.getElementById("invitationCanvas");
    let ctx = canvas.getContext("2d");

    let qr = new QRCode(qrcodeHiddenContainer, { 
      width: REGLAGES_IMAGE.tailleQR, 
      height: REGLAGES_IMAGE.tailleQR,
      correctLevel : QRCode.CorrectLevel.M 
    });

    document.getElementById("btnGenerer").addEventListener("click", async () => {
      const nom = document.getElementById("nom").value.trim();
      const categorie = document.getElementById("categorie").value;
      const nomTable = document.getElementById("nomTable").value.trim();
      const numTable = document.getElementById("numTable").value.trim();

      if(!nom || !nomTable || !numTable) {
        alert("Veuillez remplir tous les champs !");
        return;
      }

      const inviteId = "INV-" + Date.now();

      const donnéesComplètes = {
        mariage: "MarieJaphete2026",
        id: inviteId,
        nom: nom,
        cat: categorie,
        tNom: nomTable,
        tNum: numTable
      };

      qr.clear();
      qr.makeCode(JSON.stringify(donnéesComplètes));

      // Attente du rendu asynchrone de la police et du QR
      document.fonts.load(`bold ${REGLAGES_IMAGE.taillePolice} 'Cinzel'`).then(() => {
        setTimeout(() => {
          const imgQR = qrcodeHiddenContainer.querySelector("img");
          if (imgQR && imgQR.src) {
            dessinerInvitationComplete(imgQR.src, nom);
          } else {
            alert("Erreur lors de la préparation géométrique du QR code.");
          }
        }, 250);
      });

      document.getElementById("btnGenerer").disabled = true;
      document.getElementById("btnGenerer").style.opacity = "0.5";

      try {
        await setDoc(doc(db, "invites", inviteId), {
          nom: nom,
          categorie: categorie,
          nomTable: nomTable,
          numTable: numTable,
          statut: "Généré"
        });
      } catch (error) {
        console.warn("Firebase hors-ligne. Enregistré localement.");
      }
    });

    function dessinerInvitationComplete(qrCodeBase64, nomInvite) {
      const fondDesign = new Image();
      fondDesign.src = "design-invitation.png";

      fondDesign.onload = function() {
        canvas.width = fondDesign.width;
        canvas.height = fondDesign.height;
        ctx.drawImage(fondDesign, 0, 0);

        // 1. Dessin du QR Code
        const imageQR = new Image();
        imageQR.src = qrCodeBase64;

        imageQR.onload = function() {
          ctx.drawImage(
            imageQR, 
            REGLAGES_IMAGE.positionX, 
            REGLAGES_IMAGE.positionY, 
            REGLAGES_IMAGE.tailleQR, 
            REGLAGES_IMAGE.tailleQR
          );
          
          // 2. Dessin du nom de l'invité centré dans la forme arrondie inférieure
          ctx.fillStyle = REGLAGES_IMAGE.couleurTexte;
          ctx.font = `bold ${REGLAGES_IMAGE.taillePolice} 'Cinzel', serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle"; // Permet un centrage vertical parfait dans le bloc

          const milieuHorizontal = canvas.width / 2;
          const positionVerticaleForme = canvas.height - REGLAGES_IMAGE.axeYTexteDepuisLeBas;

          ctx.fillText(nomInvite, milieuHorizontal, positionVerticaleForme);

          document.getElementById("qr-wrapper").style.display = "flex";
        };
      };

      fondDesign.onerror = function() {
        alert("Erreur : Le fichier 'design-invitation.png' est introuvable.");
        document.getElementById("btnGenerer").disabled = false;
        document.getElementById("btnGenerer").style.opacity = "1";
      };
    }

    window.telechargerInvitation = function() {
      const nomInvite = document.getElementById("nom").value.trim() || "invite";
      const nomFichier = "Invitation_" + nomInvite.replace(/[^a-zA-Z0-9]/g, "_") + ".png";
      
      const imageFinaleUrl = canvas.toDataURL("image/png", 1.0);
      
      const lien = document.createElement("a");
      lien.href = imageFinaleUrl;
      lien.download = nomFichier;
      document.body.appendChild(lien);
      lien.click();
      document.body.removeChild(lien);
    }

    window.creerSuivant = function() {
      document.getElementById("formInvite").reset();
      document.getElementById("qr-wrapper").style.display = "none";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      qr.clear();

      const btnGenerer = document.getElementById("btnGenerer");
      btnGenerer.disabled = false;
      btnGenerer.style.opacity = "1";

      document.getElementById("nom").focus();
    }
  </script>
</body>
</html>
