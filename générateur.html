<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur d'Invitations - Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-back">← Retour à l'accueil</a>
    <h1>Générer une Invitation</h1>

    <div class="section">
      <div class="form-group">
        <label>Nom complet de l'invité</label>
        <input type="text" id="nom" placeholder="Ex: Jean Dupont">
      </div>
      <div class="form-group">
        <label>Catégorie d'invité</label>
        <select id="categorie">
          <option value="Famille Proche">Famille Proche</option>
          <option value="Famille Élargie">Famille Élargie</option>
          <option value="Amis">Amis</option>
          <option value="VIP">VIP</option>
          <option value="Collègues">Collègues</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nom de la table</label>
        <input type="text" id="nomTable" placeholder="Ex: Table Émeraude">
      </div>
      <div class="form-group">
        <label>Numéro de table</label>
        <input type="number" id="numTable" placeholder="Ex: 3">
      </div>
      <button class="btn-submit" id="btnGenerer">Enregistrer & Créer le QR Code</button>

      <div id="qrcode"></div>
    </div>
  </div>

  <script type="module">
    import { db, doc, setDoc } from "./firebase-config.js";

    let qrcodeContainer = document.getElementById("qrcode");
    let qr = new QRCode(qrcodeContainer, { width: 200, height: 200 });

    document.getElementById("btnGenerer").addEventListener("click", async () => {
      const nom = document.getElementById("nom").value;
      const categorie = document.getElementById("categorie").value;
      const nomTable = document.getElementById("nomTable").value;
      const numTable = document.getElementById("numTable").value;

      if(!nom || !nomTable || !numTable) {
        alert("Veuillez remplir tous les champs !");
        return;
      }

      // Générer un ID unique basé sur le temps actuel
      const inviteId = "INV-" + Date.now();

      try {
        // Enregistrement des données dans la collection "invites" de Firestore
        await setDoc(doc(db, "invites", inviteId), {
          nom: nom,
          categorie: categorie,
          nomTable: nomTable,
          numTable: numTable,
          statut: "Attente" // Pratique pour savoir s'il est déjà entré plus tard !
        });

        // Le QR Code ne contient PLUS que l'identifiant unique
        qr.clear();
        qr.makeCode(inviteId);
        
        alert("Invité enregistré avec succès dans Firebase !");
      } catch (error) {
        console.error("Erreur Firebase:", error);
        alert("Erreur lors de l'enregistrement dans la base de données.");
      }
    });
  </script>
</body>
</html>
