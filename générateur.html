<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur d'Invitations - Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-back">← Retour à l'accueil</a>
    <h1>Générer une Invitation</h1>

    <div class="section">
      <div class="form-group">
        <label>Nom complet de l'invité</label>
        <input type="text" id="nom" placeholder="Ex: Jean Dupont">
      </div>
      <div class="form-group">
        <label>Catégorie d'invité</label>
        <select id="categorie">
          <option value="Famille Proche">Famille Proche</option>
          <option value="Famille Élargie">Famille Élargie</option>
          <option value="Amis">Amis</option>
          <option value="VIP">VIP</option>
          <option value="Collègues">Collègues</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nom de la table</label>
        <input type="text" id="nomTable" placeholder="Ex: Table Émeraude">
      </div>
      <div class="form-group">
        <label>Numéro de table</label>
        <input type="number" id="numTable" placeholder="Ex: 3">
      </div>
      <button class="btn-submit" id="btnGenerer">Enregistrer & Créer le QR Code</button>

      <div id="qrcode"></div>
    </div>
  </div>

  <script type="module">
    import { db, doc, setDoc } from "./firebase-config.js";

    let qrcodeContainer = document.getElementById("qrcode");
    let qr = new QRCode(qrcodeContainer, { width: 220, height: 220 });

    document.getElementById("btnGenerer").addEventListener("click", async () => {
      const nom = document.getElementById("nom").value;
      const categorie = document.getElementById("categorie").value;
      const nomTable = document.getElementById("nomTable").value;
      const numTable = document.getElementById("numTable").value;

      if(!nom || !nomTable || !numTable) {
        alert("Veuillez remplir tous les champs !");
        return;
      }

      // Création d'un ID unique pour cet invité
      const inviteId = "INV-" + Date.now();

      // On prépare l'objet complet qui va ALLER dans le QR Code
      const donnéesComplètes = {
        mariage: "MarieJaphete2026",
        id: inviteId,
        nom: nom,
        cat: categorie,
        tNom: nomTable,
        tNum: numTable
      };

      // 1. Génération immédiate du QR Code (Fonctionne même si Firebase échoue)
      qr.clear();
      qr.makeCode(JSON.stringify(donnéesComplètes));

      // 2. Sauvegarde en tâche de fond sur Firebase (si connecté)
      try {
        await setDoc(doc(db, "invites", inviteId), {
          nom: nom,
          categorie: categorie,
          nomTable: nomTable,
          numTable: numTable,
          statut: "Généré"
        });
        alert("QR Code généré et synchronisé avec Firebase !");
      } catch (error) {
        console.warn("Firebase déconnecté, mais le QR Code a été créé localement.");
        alert("QR Code généré avec succès ! (Note : Non synchronisé sur le cloud, pas d'internet)");
      }
    });
  </script>
</body>
</html>
