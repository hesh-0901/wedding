<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur d'Invitations - Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    /* Masquer toute l'interface par défaut pour la sécurité */
    body {
      display: none;
    }

    /* Zone de résultat de l'invitation fusionnée */
    .qr-result-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px dashed var(--border);
      animation: fadeIn 0.4s ease-out forwards;
    }

    /* Conteneur d'aperçu de la carte finale */
    .preview-canvas-wrapper {
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(65, 68, 60, 0.08);
      overflow: hidden;
      background: #fcfdfe;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* Conteneur des deux boutons d'action */
    .actions-wrapper {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    @media (max-width: 500px) {
      .actions-wrapper { flex-direction: column; }
    }

    .btn-action-premium {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-download-style {
      background: white;
      color: var(--dark);
      border: 1px solid var(--gold);
    }

    .btn-download-style:hover {
      background: var(--light);
      border-color: var(--dark);
    }

    .btn-next-style {
      background: var(--dark);
      color: var(--cream);
      border: 1px solid var(--dark);
    }

    .btn-next-style:hover {
      background: var(--text);
    }

    .icon-svg-action {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    /* Élément technique masqué servant à fabriquer le QR code brut */
    #qrcode-hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-back" style="display: flex; align-items: center; gap: 6px;">
      <svg style="width:16px; height:16px; fill:none; stroke:var(--muted); stroke-width:2;" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour à l'accueil
    </a>
    
    <h1>Générer une Invitation</h1>

    <div class="section">
      <form id="formInvite" onsubmit="return false;">
        <div class="form-group">
          <label>Nom complet de l'invité</label>
          <input type="text" id="nom" placeholder="Ex: Couple Hénoch SHUNGU">
        </div>
        <div class="form-group">
          <label>Catégorie d'invité</label>
          <select id="categorie">
            <option value="Famille Proche">Famille Proche</option>
            <option value="Parents">Parents</option>
            <option value="Connaissances">Connaissances</option>
            <option value="Parains">Parains</option>
            <option value="Collègues">Collègues</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nom de la table</label>
          <input type="text" id="nomTable" placeholder="Ex: Table Émeraude">
        </div>
        <div class="form-group">
          <label>Numéro de table</label>
          <input type="number" id="numTable" placeholder="Ex: 3">
        </div>
        <button class="btn-submit" id="btnGenerer">Enregistrer & Créer le QR Code</button>
      </form>

      <div id="qrcode-hidden"></div>

      <div id="qr-wrapper" class="qr-result-container">
        <label style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;">Aperçu de l'invitation officielle</label>
        
        <div class="preview-canvas-wrapper">
          <canvas id="invitationCanvas"></canvas>
        </div>
        
        <div class="actions-wrapper">
          <button class="btn-action-premium btn-download-style" onclick="telechargerInvitation()">
            <svg class="icon-svg-action" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Télécharger l'Invitation
          </button>

          <button class="btn-action-premium btn-next-style" onclick="creerSuivant()">
            Créer le suivant
            <svg class="icon-svg-action" viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { db, doc, setDoc, getDoc } from "./firebase-config.js";

    // --- VERIFICATION SECURISEE DU MOT DE PASSE FIRESTORE ---
    async function verifierAcces() {
      try {
        // Récupération de la référence du mot de passe stocké en base
        const docRef = doc(db, "password", "pass");
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const motDePasseCorrect = docSnap.data().password;
          let saisieUser = prompt("Veuillez saisir le code d'accès pour gérer les invitations :");

          if (saisieUser === motDePasseCorrect) {
            // Si le code est bon, on affiche la page
            document.body.style.display = "block";
          } else {
            alert("Code d'accès incorrect ! Redirection...");
            window.location.href = "index.html";
          }
        } else {
          alert("Erreur de configuration : Clé d'accès introuvable sur Firebase.");
          window.location.href = "index.html";
        }
      } catch (error) {
        console.error("Erreur d'authentification : ", error);
        alert("Une erreur est survenue lors de la vérification de sécurité.");
        window.location.href = "index.html";
      }
    }

    // Exécuter le verrou de sécurité immédiatement au chargement
    verifierAcces();

    // --- CONFIGURATION DU POSITIONNEMENT DU QR CODE SUR TON DESIGN ---
    const REGLAGES_IMAGE = {
      tailleQR: 130,   
      positionX: 325,  
      positionY: 666   
    };
    
    let qrcodeHiddenContainer = document.getElementById("qrcode-hidden");
    let canvas = document.getElementById("invitationCanvas");
    let ctx = canvas.getContext("2d");

    let qr = new QRCode(qrcodeHiddenContainer, { 
      width: REGLAGES_IMAGE.tailleQR, 
      height: REGLAGES_IMAGE.tailleQR,
      correctLevel : QRCode.CorrectLevel.M 
    });

    document.getElementById("btnGenerer").addEventListener("click", async () => {
      const nom = document.getElementById("nom").value.trim();
      const categorie = document.getElementById("categorie").value;
      const nomTable = document.getElementById("nomTable").value.trim();
      const numTable = document.getElementById("numTable").value.trim();

      if(!nom || !nomTable || !numTable) {
        alert("Veuillez remplir tous les champs !");
        return;
      }

      const inviteId = "INV-" + Date.now();

      const donnéesComplètes = {
        mariage: "MarieJaphete2026",
        id: inviteId,
        nom: nom,
        cat: categorie,
        tNom: nomTable,
        tNum: numTable
      };

      qr.clear();
      qr.makeCode(JSON.stringify(donnéesComplètes));

      setTimeout(() => {
        const imgQR = qrcodeHiddenContainer.querySelector("img");
        if (imgQR && imgQR.src) {
          dessinerInvitationComplete(imgQR.src);
        } else {
          alert("Erreur lors de la préparation géométrique du QR code.");
        }
      }, 250);

      document.getElementById("btnGenerer").disabled = true;
      document.getElementById("btnGenerer").style.opacity = "0.5";

      try {
        await setDoc(doc(db, "invites", inviteId), {
          nom: nom,
          categorie: categorie,
          nomTable: nomTable,
          numTable: numTable,
          statut: "Généré"
        });
      } catch (error) {
        console.warn("Firebase hors-ligne. Enregistré localement.");
      }
    });

    function dessinerInvitationComplete(qrCodeBase64) {
      const fondDesign = new Image();
      fondDesign.src = "design-invitation.png";

      fondDesign.onload = function() {
        canvas.width = fondDesign.width;
        canvas.height = fondDesign.height;
        ctx.drawImage(fondDesign, 0, 0);

        const imageQR = new Image();
        imageQR.src = qrCodeBase64;

        imageQR.onload = function() {
          ctx.drawImage(
            imageQR, 
            REGLAGES_IMAGE.positionX, 
            REGLAGES_IMAGE.positionY, 
            REGLAGES_IMAGE.tailleQR, 
            REGLAGES_IMAGE.tailleQR
          );
          document.getElementById("qr-wrapper").style.display = "flex";
        };
      };

      fondDesign.onerror = function() {
        alert("Erreur : Le fichier 'design-invitation.png' est introuvable.");
        document.getElementById("btnGenerer").disabled = false;
        document.getElementById("btnGenerer").style.opacity = "1";
      };
    }

    window.telechargerInvitation = function() {
      const nomInvite = document.getElementById("nom").value.trim() || "invite";
      const nomFichier = "Invitation_" + nomInvite.replace(/[^a-zA-Z0-9]/g, "_") + ".png";
      const imageFinaleUrl = canvas.toDataURL("image/png");
      
      const lien = document.createElement("a");
      lien.href = imageFinaleUrl;
      lien.download = nomFichier;
      document.body.appendChild(lien);
      lien.click();
      document.body.removeChild(lien);
    }

    window.creerSuivant = function() {
      document.getElementById("formInvite").reset();
      document.getElementById("qr-wrapper").style.display = "none";
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      qr.clear();

      const btnGenerer = document.getElementById("btnGenerer");
      btnGenerer.disabled = false;
      btnGenerer.style.opacity = "1";

      document.getElementById("nom").focus();
    }
  </script>
</body>
</html>
