<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur d'Invitations - Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    /* Zone de résultat du QR Code */
    .qr-result-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px dashed var(--border);
      animation: fadeIn 0.4s ease-out forwards;
    }

    #qrcode {
      padding: 15px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(65, 68, 60, 0.02);
    }

    /* Conteneur des deux boutons d'action */
    .actions-wrapper {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    @media (max-width: 500px) {
      .actions-wrapper { flex-direction: column; }
    }

    .btn-action-premium {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-download-style {
      background: white;
      color: var(--dark);
      border: 1px solid var(--gold);
    }

    .btn-download-style:hover {
      background: var(--light);
      border-color: var(--dark);
    }

    .btn-next-style {
      background: var(--dark);
      color: var(--cream);
      border: 1px solid var(--dark);
    }

    .btn-next-style:hover {
      background: var(--text);
    }

    .icon-svg-action {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-back" style="display: flex; align-items: center; gap: 6px;">
      <svg style="width:16px; height:16px; fill:none; stroke:var(--muted); stroke-width:2;" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour à l'accueil
    </a>
    
    <h1>Générer une Invitation</h1>

    <div class="section">
      <form id="formInvite" onsubmit="return false;">
        <div class="form-group">
          <label>Nom complet de l'invité</label>
          <input type="text" id="nom" placeholder="Ex: Jean Dupont">
        </div>
        <div class="form-group">
          <label>Catégorie d'invité</label>
          <select id="categorie">
            <option value="Famille Proche">Famille Proche</option>
            <option value="Famille Élargie">Famille Élargie</option>
            <option value="Amis">Amis</option>
            <option value="VIP">VIP</option>
            <option value="Collègues">Collègues</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nom de la table</label>
          <input type="text" id="nomTable" placeholder="Ex: Table Émeraude">
        </div>
        <div class="form-group">
          <label>Numéro de table</label>
          <input type="number" id="numTable" placeholder="Ex: 3">
        </div>
        <button class="btn-submit" id="btnGenerer">Enregistrer & Créer le QR Code</button>
      </form>

      <div id="qr-wrapper" class="qr-result-container">
        <div id="qrcode"></div>
        
        <div class="actions-wrapper">
          <button class="btn-action-premium btn-download-style" onclick="telechargerQR()">
            <svg class="icon-svg-action" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Télécharger
          </button>

          <button class="btn-action-premium btn-next-style" onclick="creerSuivant()">
            Créer le suivant
            <svg class="icon-svg-action" viewBox="0 0 24 24">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { db, doc, setDoc } from "./firebase-config.js";

    let qrcodeContainer = document.getElementById("qrcode");
    let qr = new QRCode(qrcodeContainer, { 
      width: 250, 
      height: 250,
      correctLevel : QRCode.CorrectLevel.H
    });

    document.getElementById("btnGenerer").addEventListener("click", async () => {
      const nom = document.getElementById("nom").value.trim();
      const categorie = document.getElementById("categorie").value;
      const nomTable = document.getElementById("nomTable").value.trim();
      const numTable = document.getElementById("numTable").value.trim();

      if(!nom || !nomTable || !numTable) {
        alert("Veuillez remplir tous les champs !");
        return;
      }

      const inviteId = "INV-" + Date.now();

      const donnéesComplètes = {
        mariage: "MarieJaphete2026",
        id: inviteId,
        nom: nom,
        cat: categorie,
        tNom: nomTable,
        tNum: numTable
      };

      // 1. Génération visuelle du QR
      qr.clear();
      qr.makeCode(JSON.stringify(donnéesComplètes));

      // Afficher le bloc d'actions
      document.getElementById("qr-wrapper").style.display = "flex";

      // Désactiver temporairement le bouton principal pour éviter les doubles clics
      document.getElementById("btnGenerer").disabled = true;
      document.getElementById("btnGenerer").style.opacity = "0.5";

      // 2. Envoi cloud furtif
      try {
        await setDoc(doc(db, "invites", inviteId), {
          nom: nom,
          categorie: categorie,
          nomTable: nomTable,
          numTable: numTable,
          statut: "Généré"
        });
      } catch (error) {
        console.warn("Firebase hors-ligne. Enregistré localement.");
      }
    });

    // Fonction de Téléchargement
    window.telechargerQR = function() {
      const nomInvite = document.getElementById("nom").value.trim() || "invite";
      const nomFichier = "Invitation_" + nomInvite.replace(/[^a-zA-Z0-9]/g, "_") + ".png";
      const imgQR = qrcodeContainer.querySelector("img");
      
      if (imgQR && imgQR.src) {
        const lien = document.createElement("a");
        lien.href = imgQR.src;
        lien.download = nomFichier;
        document.body.appendChild(lien);
        lien.click();
        document.body.removeChild(lien);
      } else {
        alert("L'image du QR code se prépare, réessayez dans une seconde.");
      }
    }

    // Fonction Réinitialisation (Créer le suivant)
    window.creerSuivant = function() {
      // 1. Remise à zéro complète du formulaire
      document.getElementById("formInvite").reset();

      // 2. Masquage de la zone QR code
      document.getElementById("qr-wrapper").style.display = "none";
      qr.clear();

      // 3. Réactivation du bouton de validation principal
      const btnGenerer = document.getElementById("btnGenerer");
      btnGenerer.disabled = false;
      btnGenerer.style.opacity = "1";

      // 4. Focus automatique sur le premier champ pour taper immédiatement
      document.getElementById("nom").focus();
    }
  </script>
</body>
</html>
