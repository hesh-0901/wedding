<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur d'Invitations - Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-back">← Retour à l'accueil</a>
    
    <h1>Générer une Invitation</h1>

    <div class="section">
      <div class="form-group">
        <label>Nom complet de l'invité</label>
        <input type="text" id="nom" placeholder="Ex: Jean Dupont">
      </div>
      <div class="form-group">
        <label>Catégorie d'invité</label>
        <select id="categorie">
          <option value="Famille Proche">Famille Proche</option>
          <option value="Famille Élargie">Famille Élargie</option>
          <option value="Amis">Amis</option>
          <option value="VIP">VIP</option>
          <option value="Collègues">Collègues</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nom de la table</label>
        <input type="text" id="nomTable" placeholder="Ex: Table Émeraude">
      </div>
      <div class="form-group">
        <label>Numéro de table</label>
        <input type="number" id="numTable" placeholder="Ex: 3">
      </div>
      <button class="btn-submit" onclick="genererQR()">Générer le QR Code</button>

      <div id="qrcode"></div>
    </div>
  </div>

  <script>
    let qrcodeContainer = document.getElementById("qrcode");
    let qr = new QRCode(qrcodeContainer, { width: 200, height: 200 });

    function genererQR() {
      const nom = document.getElementById("nom").value;
      const categorie = document.getElementById("categorie").value;
      const nomTable = document.getElementById("nomTable").value;
      const numTable = document.getElementById("numTable").value;

      if(!nom || !nomTable || !numTable) {
        alert("Veuillez remplir tous les champs !");
        return;
      }

      // Payload JSON sécurisé exclusif pour Marie & Japhète
      const donnéesMariage = {
        mariage: "MarieJaphete2026", 
        nom: nom,
        cat: categorie,
        tNom: nomTable,
        tNum: numTable
      };

      qr.clear();
      qr.makeCode(JSON.stringify(donnéesMariage));
    }
  </script>
</body>
</html>
