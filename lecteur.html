<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contrôle d'Accès Privé - Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    /* Ajustements premium spécifiques pour l'interface du lecteur */
    .scanner-wrapper {
      display: block;
    }
    
    /* Écran de la fiche invité (Masqué par défaut) */
    .guest-profile-screen {
      display: none;
      animation: fadeIn 0.4s ease-out forwards;
    }

    .premium-card {
      background: white;
      border: 1px solid var(--border);
      border-top: 4px solid var(--gold);
      border-radius: 12px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(65, 68, 60, 0.05);
    }

    .icon-container {
      width: 64px;
      height: 64px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px auto;
    }

    .icon-svg {
      width: 28px;
      height: 28px;
       Tarification couleur par défaut */
      stroke: var(--dark);
      fill: none;
      stroke-width: 2;
    }

    .guest-header {
      margin-bottom: 30px;
    }

    .guest-fullname {
      font-size: 2.2rem;
      color: var(--dark);
      font-weight: normal;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .guest-tag {
      display: inline-block;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 16px;
      border-radius: 20px;
      background: var(--cream);
    }

    .grid-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      border-top: 1px solid var(--cream);
      border-bottom: 1px solid var(--cream);
      padding: 24px 0;
      margin-bottom: 35px;
    }

    .detail-item {
      text-align: center;
    }

    .detail-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 1.4rem;
      color: var(--text);
      font-weight: normal;
    }

    /* Badge de synchronisation cloud dynamique */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      padding: 8px 20px;
      border-radius: 6px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .status-syncing {
      background: var(--cream);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .status-verified {
      background: #f0f7ec;
      color: #4c6b36;
      border: 1px solid #cce0bf;
    }

    .status-error {
      background: #fdf2f2;
      color: #9b2c2c;
      border: 1px solid #f5c6c6;
    }

    .btn-next {
      background: var(--dark);
      color: var(--cream);
      border: none;
      padding: 16px 32px;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .btn-next:hover {
      background: var(--text);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="btn-back" style="display: flex; align-items: center; gap: 6px;">
      <svg class="icon-svg" style="width:16px; height:16px;" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour à l'accueil
    </a>
    
    <h1 id="page-title">Contrôle d'Accès Privé</h1>

    <div id="scanner-screen" class="section scanner-wrapper">
      <div id="reader"></div>
    </div>

    <div id="guest-screen" class="guest-profile-screen">
      <div class="premium-card">
        
        <div class="icon-container">
          <svg class="icon-svg" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>

        <div class="guest-header">
          <div class="guest-fullname" id="res-nom">Marie-Claire Lumeya</div>
          <div class="guest-tag" id="res-categorie">VIP</div>
        </div>

        <div class="grid-details">
          <div class="detail-item" style="border-right: 1px solid var(--border);">
            <div class="detail-label">Table officielle</div>
            <div class="detail-value" id="res-nomTable">Émeraude</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Position N°</div>
            <div class="detail-value" id="res-numTable">04</div>
          </div>
        </div>

        <div style="margin-bottom: 25px;">
          <div id="cloud-status-badge" class="status-badge status-syncing">
            <svg class="icon-svg" style="width:16px; height:16px; stroke: currentColor;" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            <span id="cloud-status-text">Analyse locale</span>
          </div>
        </div>

        <button class="btn-next" onclick="reprendreScan()">
          Suivant
          <svg class="icon-svg" style="width:18px; height:18px; stroke: var(--cream);" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

      </div>
    </div>

  </div>

  <script type="module">
    import { db, doc, getDoc } from "./firebase-config.js";

    let html5QrcodeScanner;
    
    // Initialisation globale du Scanner
    function initialiserScanner() {
      html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 15, 
        qrbox: 260,
        aspectRatio: 1.0
      });
      html5QrcodeScanner.render(onScanSuccess);
    }

    async function onScanSuccess(decodedText, decodedResult) {
      try {
        const data = JSON.parse(decodedText);
        
        if(data.mariage === "MarieJaphete2026") {
          
          // 1. ARRÊT IMMÉDIAT DE LA CAMÉRA (UX fluide)
          if (html5QrcodeScanner) {
            await html5QrcodeScanner.clear();
          }

          // 2. INJECTION DES DONNÉES DANS L'INTERFACE
          document.getElementById("res-nom").innerText = data.nom;
          document.getElementById("res-categorie").innerText = data.cat;
          document.getElementById("res-nomTable").innerText = data.tNom;
          document.getElementById("res-numTable").innerText = data.tNum.padStart(2, '0'); // Ajoute un 0 si chiffre unique (ex: 05)

          // 3. SWITCH D'INTERFACE (Bascule d'écrans)
          document.getElementById("page-title").innerText = "Invitation Validée";
          document.getElementById("scanner-screen").style.display = "none";
          document.getElementById("guest-screen").style.display = "block";

          // 4. PROTOCOLE DE VÉRIFICATION FIREBASE (CLOUD CLANDESTIN OUVALIDE)
          const badge = document.getElementById("cloud-status-badge");
          const label = document.getElementById("cloud-status-text");

          if (navigator.onLine) {
            // Statut d'attente pro
            badge.className = "status-badge status-syncing";
            label.innerText = "Synchronisation cloud...";

            try {
              const docRef = doc(db, "invites", data.id);
              const docSnap = await getDoc(docRef);

              if (docSnap.exists()) {
                // Succès : Présence validée sur la collection Firebase
                badge.className = "status-badge status-verified";
                label.innerText = "Liste officielle validée";
              } else {
                // Erreur : Absent de Firestore
                badge.className = "status-badge status-error";
                label.innerText = "Non répertorié sur le serveur";
              }
            } catch (error) {
              // Problème de timeout ou micro-coupure réseau
              badge.className = "status-badge status-syncing";
              label.innerText = "Données sécurisées hors-ligne";
            }
          } else {
            // Mode strictement offline
            badge.className = "status-badge status-syncing";
            label.innerText = "Vérification locale (Hors-ligne)";
          }

        } else {
          alert("Code d'accès non affilié à cet événement.");
        }
      } catch (e) {
        alert("Structure de code non reconnue.");
      }
    }

    // Rendre la fonction de réinitialisation disponible pour le bouton "Suivant"
    window.reprendreScan = function() {
      document.getElementById("page-title").innerText = "Contrôle d'Accès Privé";
      document.getElementById("guest-screen").style.display = "none";
      document.getElementById("scanner-screen").style.display = "block";
      initialiserScanner(); // Relance proprement la caméra
    }

    // Premier démarrage au chargement de la page
    initialiserScanner();
  </script>
</body>
</html>
