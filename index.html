<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariage de Marie & Japhète</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2b2d27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <style>
    .brand-header { text-align: center; margin-bottom: 50px; }
    .brand-logo-container {
      width: 50px; height: 50px; margin: 0 auto 20px auto;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 50%; background: white; color: var(--gold);
    }
    .nav-container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    .btn-large {
      display: flex; align-items: center; justify-content: flex-start; gap: 20px;
      text-decoration: none; background: white; color: var(--dark); border: 1px solid var(--border);
      padding: 24px 28px; font-size: 1.2rem; border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 12px rgba(65, 68, 60, 0.02);
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
    }
    .btn-large:hover {
      border-color: var(--gold); background: var(--light); transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(65, 68, 60, 0.05);
    }
    .btn-large-text { display: flex; flex-direction: column; align-items: flex-start; text-align: left; }
    .btn-large-title { font-size: 1.2rem; color: var(--text); }
    .btn-large-subtitle {
      font-size: 0.8rem; color: var(--muted); font-family: system-ui, -apple-system, sans-serif;
      margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .icon-bootstrap { width: 24px; height: 24px; fill: none; stroke: var(--dark); stroke-width: 1.5; flex-shrink: 0; transition: stroke 0.3s; }
    .btn-large:hover .icon-bootstrap { stroke: var(--gold); }

    /* Forcé en flex pour l'aperçu immédiat avant l'ajout des icônes PNG */
    .btn-install-pwa {
      display: flex;
      border: 1px dashed var(--gold);
      background: #fcfdfe;
    }
    .btn-install-pwa:hover {
      background: #f9fbf7;
    }
  </style>
</head>
<body>

  <div class="container" style="margin-top: 5vh;">
    
    <div class="brand-header">
      <div class="brand-logo-container">
        <svg class="icon-bootstrap" style="stroke: var(--gold);" viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>
      <h1>Marie & Japhète</h1>
      <h2 style="font-style: italic; font-size: 1.1rem; color: var(--muted); margin-top: 5px;">Portail Privé de Gestion</h2>
    </div>

    <div class="nav-container">
      
      <button id="pwaInstallBtn" class="btn-large btn-install-pwa">
        <svg class="icon-bootstrap" viewBox="0 0 24 24" style="stroke: var(--gold);">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        <div class="btn-large-text">
          <span class="btn-large-title" style="color: var(--dark);">Télécharger l'Application</span>
          <span class="btn-large-subtitle">Installer sur cet appareil pour un accès direct</span>
        </div>
      </button>
      
      <a href="générateur.html" class="btn-large">
        <svg class="icon-bootstrap" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3" rx="0.5"/>
          <rect x="18" y="18" width="3" height="3" rx="0.5"/>
          <path d="M14 17h1v1h-1zm3 0h1v1h-1zm1-3h1v1h-1zm-1 1h1v1h-1z"/>
        </svg>
        <div class="btn-large-text">
          <span class="btn-large-title">Créer une Invitation</span>
          <span class="btn-large-subtitle">Générer un accès & enregistrer</span>
        </div>
      </a>

      <a href="lecteur.html" class="btn-large">
        <svg class="icon-bootstrap" viewBox="0 0 24 24">
          <path d="M4 4h4V2H4a2 2 0 0 0-2 2v4h2V4zm16-2h-4v2h4v4h2V4a2 2 0 0 0-2-2zM4 20h4v2H4a2 2 0 0 1-2-2v-4h2v4zm16 2h-4v-2h4v-4h2v4a2 2 0 0 1-2 2zM7 12h10v2H7z"/>
        </svg>
        <div class="btn-large-text">
          <span class="btn-large-title">Ouvrir le Lecteur</span>
          <span class="btn-large-subtitle">Contrôle d'accès en direct</span>
        </div>
      </a>

      <a href="invités.html" class="btn-large">
        <svg class="icon-bootstrap" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
        <div class="btn-large-text">
          <span class="btn-large-title">Liste des Invités</span>
          <span class="btn-large-subtitle">Consulter, filtrer & rechercher</span>
        </div>
      </a>

    </div>
  </div>

  <script>
    // 1. Enregistrement classique du Service Worker PWA
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then((reg) => console.log("PWA Active :", reg.scope))
          .catch((err) => console.error("Erreur PWA :", err));
      });
    }

    // 2. Logique d'interception du bouton d'installation
    let differePrompt;
    const btnInstall = document.getElementById("pwaInstallBtn");

    // Masque immédiatement le bouton si l'application s'exécute déjà en mode autonome autonome (PWA déjà lancée)
    if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) {
      btnInstall.style.display = "none";
    }

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      differePrompt = e;
      // S'assure de l'afficher si le navigateur valide l'installation
      btnInstall.style.display = "flex";
    });

    btnInstall.addEventListener("click", async () => {
      // Si le prompt natif n'est pas encore prêt (absence d'images), on met un message d'attente amical
      if (!differePrompt) {
        alert("Préparation de l'application... L'installation sera entièrement disponible dès que les fichiers d'icônes 'icon-192.png' et 'icon-512.png' seront ajoutés à la racine de votre projet.");
        return;
      }
      
      differePrompt.prompt();
      const { outcome } = await differePrompt.userChoice;
      console.log(`Choix d'installation : ${outcome}`);
      
      differePrompt = null;
      btnInstall.style.display = "none";
    });

    window.addEventListener("appinstalled", () => {
      btnInstall.style.display = "none";
      differePrompt = null;
      alert("Application installée avec succès ! Retrouvez-la sur votre écran d'accueil ou votre bureau.");
    });
  </script>

</body>
</html>
