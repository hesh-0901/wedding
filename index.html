<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur QR · Mariage Japhète & Marie</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-ornament">✦ &nbsp; Mariage Japhète & Marie &nbsp; ✦</div>
  <h1>Générateur de QR codes</h1>
  <p>Un QR unique par invité · Design élégant · 100 % offline</p>
</header>

<div class="container">

  <!-- FORMULAIRE -->
  <div class="card">
    <div class="card-title">Informations invité</div>

    <div class="field">
      <label>Nom complet</label>
      <input type="text" id="nom" placeholder="ex : Marie Dupont" autocomplete="off">
    </div>

    <div class="field">
      <label>Catégorie</label>
      <select id="categorie">
        <option value="">— Sélectionner —</option>
        <option value="Famille">Famille</option>
        <option value="Ami(e)">Ami(e)</option>
        <option value="Collègue">Collègue</option>
        <option value="VIP">VIP</option>
        <option value="Enfant">Enfant</option>
      </select>
    </div>

    <div class="grid2">
      <div class="field">
        <label>Nom de table</label>
        <input type="text" id="nomtable" placeholder="ex : Table des Roses">
      </div>
      <div class="field">
        <label>N° de table</label>
        <input type="number" id="numtable" placeholder="ex : 5" min="1">
      </div>
    </div>

    <div class="field-initiales">
      <label>Initiales des mariés (centre du QR)</label>
      <input type="text" id="initiales" placeholder="ex : J & M" value="J & M" maxlength="6" autocomplete="off">
    </div>

    <button class="btn-gen" onclick="generer()">Générer le QR code</button>
  </div>

  <!-- APERÇU -->
  <div class="card">
    <div class="card-title">Aperçu</div>
    <div class="qr-panel" id="qr-panel">
      <div class="empty">
        <div class="empty-icon">◈</div>
        <p>Remplis le formulaire<br>et génère le QR code<br>de ton invité</p>
      </div>
    </div>
  </div>

</div>

<footer>Aucune connexion requise &nbsp;·&nbsp; Données 100 % privées &nbsp;·&nbsp; Fichier autonome</footer>

/* ═══════════════════════════════════════════════════════
   DESSIN DU QR CODE STYLÉ
   · Modules : carrés, grands (92%)
   · Coins   : arrondis avec contour renforcé (double trait)
   · Centre  : cercle plein sans contour + initiales
═══════════════════════════════════════════════════════ */
var DARK  = '#41443c';
var LIGHT = '#e9f6de';

function drawFinder(ctx, px, py, s, r) {
  /* Contour renforcé : on dessine d'abord un carré légèrement plus grand */
  var outerR  = s * r;
  var gapR    = s * r * 0.6;
  var innerR  = s * r * 0.38;
  var bw      = s * 0.18; /* épaisseur du bord = 18% du tile → trait fort */

  /* Halo légèrement plus grand pour renforcer visuellement le contour */
  ctx.fillStyle = DARK;
  ctx.beginPath();
  ctx.roundRect(px - bw*0.3, py - bw*0.3, s*7 + bw*0.6, s*7 + bw*0.6, outerR + bw*0.3);
  ctx.fill();

  /* Carré extérieur principal */
  ctx.fillStyle = DARK;
  ctx.beginPath();
  ctx.roundRect(px, py, s*7, s*7, outerR);
  ctx.fill();

  /* Gap blanc */
  ctx.fillStyle = LIGHT;
  ctx.beginPath();
  ctx.roundRect(px + s, py + s, s*5, s*5, gapR);
  ctx.fill();

  /* Carré intérieur */
  ctx.fillStyle = DARK;
  ctx.beginPath();
  ctx.roundRect(px + s*2, py + s*2, s*3, s*3, innerR);
  ctx.fill();
}

function drawStyledQR(canvas, text, initiales) {
  var matrix  = QRC.matrix(text);
  var ctx     = canvas.getContext('2d');
  var S       = canvas.width;
  var n       = matrix.length;
  var tile    = S / n;
  var modSize = 0.82;
  var cornerR = 0.55;

  ctx.clearRect(0, 0, S, S);
  ctx.fillStyle = LIGHT;
  ctx.fillRect(0, 0, S, S);

  /* Zones finder → à ignorer dans la boucle modules */
  var skip = new Set();
  [[0,0],[0,n-7],[n-7,0]].forEach(function(f) {
    for (var r=f[0]-1; r<=f[0]+7; r++)
      for (var c=f[1]-1; c<=f[1]+7; c++)
        skip.add(r+','+c);
  });

  /* Modules de données — carrés, grands */
  for (var row=0; row<n; row++) {
    for (var col=0; col<n; col++) {
      if (skip.has(row+','+col)) continue;
      if (!matrix[row][col]) continue;
      var cx   = col*tile + tile/2;
      var cy   = row*tile + tile/2;
      var half = (tile * modSize) / 2;
      ctx.fillStyle = DARK;
      ctx.fillRect(cx-half, cy-half, half*2, half*2);
    }
  }

  /* Coins arrondis renforcés */
  drawFinder(ctx, 0,          0,          tile, cornerR);
  drawFinder(ctx, (n-7)*tile, 0,          tile, cornerR);
  drawFinder(ctx, 0,          (n-7)*tile, tile, cornerR);

  /* Initiales — grand cercle plein, sans contour */
  var cr = tile * 2.2;    /* plus grand qu'avant */
  var cx2 = S / 2;
  var cy2 = S / 2;

  /* Zone de nettoyage autour du cercle (efface les modules qui se cachent derrière) */
  ctx.fillStyle = LIGHT;
  ctx.beginPath();
  ctx.arc(cx2, cy2, cr + tile * 0.25, 0, Math.PI*2);
  ctx.fill();

  /* Cercle plein — aucun contour */
  ctx.fillStyle = DARK;
  ctx.beginPath();
  ctx.arc(cx2, cy2, cr, 0, Math.PI*2);
  ctx.fill();

  /* Texte initiales */
  ctx.fillStyle = LIGHT;
  var fs = Math.round(cr * 0.46);
  ctx.font = 'italic ' + fs + 'px Georgia, serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(initiales || 'J & M', cx2, cy2);
}

/* ═══════════════════════════════════════════════════════
   CONSTRUCTION DU TEXTE QR
   Structure lisible à la caméra iOS :
   ─────────────────────────────────
   [Nom de l'invité]
   Mariage Japhète & Marie
   Lieu : ...
   10h00 : Civil | 12h30 : Religieux | ...
   NB : Cadeaux en espèces
   ─────────────────────────────────
   Données secrètes (app lecteur) :
   WQR:[base64 JSON catégorie+table]
═══════════════════════════════════════════════════════ */
function buildQRText(nom, cat, nomtable, numtable) {
  var payload = { c: cat, t: nomtable, n: numtable };
  var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  return nom + '\n' + WEDDING_INFO + '\nWQR:' + encoded;
}

/* ═══════════════════════════════════════════════════════
   LOGIQUE APP
═══════════════════════════════════════════════════════ */
var lastCanvas = null;
var lastNom    = '';

function generer() {
  var nom       = document.getElementById('nom').value.trim();
  var cat       = document.getElementById('categorie').value;
  var nomtable  = document.getElementById('nomtable').value.trim();
  var numtable  = document.getElementById('numtable').value.trim();
  var initiales = document.getElementById('initiales').value.trim() || 'J & M';

  if (!nom) { alert('Merci de saisir le nom de l\'invité.'); return; }

  lastNom = nom;
  var qrText = buildQRText(nom, cat, nomtable, numtable);

  document.getElementById('qr-panel').innerHTML = `
    <div class="qr-outer-frame">
      <canvas id="qr-canvas" width="320" height="320"></canvas>
      <div class="qr-name-display">${nom}</div>
      <div class="qr-sub-display">Nom + infos mariage visibles à la caméra iOS</div>
    </div>
    <div class="chips">
      <div class="chip">
        <div class="chip-lbl">Catégorie</div>
        <div class="chip-val">${cat || '—'}</div>
      </div>
      <div class="chip">
        <div class="chip-lbl">N° de table</div>
        <div class="chip-val">${numtable || '—'}</div>
      </div>
      <div class="chip full">
        <div class="chip-lbl">Nom de la table</div>
        <div class="chip-val">${nomtable || '—'}</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-dl" onclick="telecharger()">↓ Télécharger PNG</button>
      <button class="btn-new" onclick="nouveau()">+ Nouvel invité</button>
    </div>
  `;

  var canvas = document.getElementById('qr-canvas');
  drawStyledQR(canvas, qrText, initiales);
  lastCanvas = canvas;
}

function telecharger() {
  if (!lastCanvas) return;
  var a = document.createElement('a');
  a.download = 'qr-' + lastNom.replace(/\s+/g, '-').toLowerCase() + '.png';
  a.href = lastCanvas.toDataURL('image/png');
  a.click();
}

function nouveau() {
  ['nom', 'categorie', 'nomtable', 'numtable'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('qr-panel').innerHTML = `
    <div class="empty">
      <div class="empty-icon">◈</div>
      <p>Remplis le formulaire<br>et génère le QR code<br>de ton invité</p>
    </div>`;
  document.getElementById('nom').focus();
}
</script>
