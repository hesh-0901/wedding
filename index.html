<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Invitations de Mariage</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --dark:   #41443c;
      --light:  #e9f6de;
      --accent: #a4b38f;
      --cream:  #f5f9f0;
      --border: #c8d9b8;
      --text:   #2e3129;
      --muted:  #6b7460;
      --gold:   #c9a84c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1, h2 {
      text-align: center;
      color: var(--dark);
      margin-bottom: 20px;
      font-weight: normal;
    }

    h1 {
      border-bottom: 2px solid var(--gold);
      padding-bottom: 10px;
      letter-spacing: 1px;
    }

    .section {
      background: white;
      padding: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    /* Formulaire */
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Georgia', serif;
      background: var(--cream);
      color: var(--text);
    }
    input:focus {
      outline: none;
      border-color: var(--gold);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--dark);
      color: var(--cream);
      border: none;
      border-radius: 4px;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: var(--muted);
    }

    /* Zone QR Code */
    #qrcode {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      padding: 10px;
    }

    /* Lecteur */
    #reader {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      border: 1px solid var(--border) !important;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Ticket d'invitation stylisé (Résultat du Scan) */
    .ticket {
      display: none;
      background: white;
      border: 2px solid var(--gold);
      border-radius: 12px;
      padding: 25px;
      margin-top: 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    .ticket::before {
      content: "✨";
      display: block;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    .ticket-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 15px;
    }
    .guest-name {
      font-size: 1.8rem;
      color: var(--dark);
      margin-bottom: 5px;
    }
    .guest-category {
      font-style: italic;
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 1rem;
    }
    .table-info {
      display: flex;
      justify-content: space-around;
      border-top: 1px dashed var(--border);
      padding-top: 15px;
      margin-top: 15px;
    }
    .info-block span {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .info-block strong {
      font-size: 1.2rem;
      color: var(--dark);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Mariage Élégant - Accès & Invitations</h1>

    <div class="section">
      <h2>1. Générer une Invitation</h2>
      <div class="form-group">
        <label>Nom complet de l'invité</label>
        <input type="text" id="nom" placeholder="Ex: Jean Dupont">
      </div>
      <div class="form-group">
        <label>Catégorie d'invité</label>
        <select id="categorie">
          <option value="Famille Proche">Famille Proche</option>
          <option value="Amis">Amis</option>
          <option value="VIP">VIP</option>
          <option value="Collègues">Collègues</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nom de la table</label>
        <input type="text" id="nomTable" placeholder="Ex: Table des Roses">
      </div>
      <div class="form-group">
        <label>Numéro de table</label>
        <input type="number" id="numTable" placeholder="Ex: 5">
      </div>
      <button onclick="genererQR()">Créer le QR Code</button>

      <div id="qrcode"></div>
    </div>

    <div class="section">
      <h2>2. Scanner une Invitation (Entrée)</h2>
      <div id="reader"></div>

      <div id="ticket-resultat" class="ticket">
        <div class="ticket-title">Invitation Validée</div>
        <div class="guest-name" id="res-nom">-</div>
        <div class="guest-category" id="res-categorie">-</div>
        
        <div class="table-info">
          <div class="info-block">
            <span>Table</span>
            <strong id="res-nomTable">-</strong>
          </div>
          <div class="info-block">
            <span>N° de Table</span>
            <strong id="res-numTable">-</strong>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- PARTIE 1 : GENERATION ---
    let qrcodeContainer = document.getElementById("qrcode");
    let qr = new QRCode(qrcodeContainer, { width: 180, height: 180 });

    function genererQR() {
      const nom = document.getElementById("nom").value;
      const categorie = document.getElementById("categorie").value;
      const nomTable = document.getElementById("nomTable").value;
      const numTable = document.getElementById("numTable").value;

      if(!nom || !nomTable || !numTable) {
        alert("Veuillez remplir tous les champs !");
        return;
      }

      // On regroupe les infos dans un objet JSON spécial
      // On ajoute un tag "ID_MARIAGE" secret pour que le lecteur sache que c'est le bon QR code
      const donnéesBrutes = {
        app: "MariageUnique2026", 
        nom: nom,
        cat: categorie,
        tNom: nomTable,
        tNum: numTable
      };

      // Convertir en texte JSON pour le mettre dans le QR code
      const texteQR = JSON.stringify(donnéesBrutes);
      
      qr.clear();
      qr.makeCode(texteQR);
    }

    // --- PARTIE 2 : SCANNER (LECTEUR) ---
    function onScanSuccess(decodedText, decodedResult) {
      try {
        // On essaie de lire le JSON caché dans le QR Code
        const data = JSON.parse(decodedText);
        
        // Sécurité : On vérifie si c'est bien un QR code généré par notre app
        if(data.app === "MariageUnique2026") {
          
          // Mettre à jour les informations de manière ultra-lisible
          document.getElementById("res-nom").innerText = data.nom;
          document.getElementById("res-categorie").innerText = data.cat;
          document.getElementById("res-nomTable").innerText = data.tNom;
          document.getElementById("res-numTable").innerText = data.tNum;
          
          // Afficher la carte d'invitation stylisée
          document.getElementById("ticket-resultat").style.display = "block";
          
          // Optionnel : émettre un petit bip ou vibration ici
        } else {
          alert("QR Code valide, mais ce n'est pas une invitation pour ce mariage.");
        }
      } catch (e) {
        alert("Ce QR code ne contient pas des données d'invitation valides.");
      }
    }

    // Initialisation du scanner caméra
    let html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", { fps: 10, qrbox: 250 }
    );
    html5QrcodeScanner.render(onScanSuccess);
  </script>
</body>
</html>
